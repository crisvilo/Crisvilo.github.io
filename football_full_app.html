.sidebar{width:160px;flex-shrink:0;background:var(--s1);border-right:0.5px solid var(--b1);padding:.75rem 0}
.lbtn{display:flex;align-items:center;gap:8px;width:100%;padding:.55rem .875rem;border:none;background:none;color:var(--tx2);font-size:12px;cursor:pointer;border-left:2px solid transparent;transition:.12s;text-align:left}

const SDEFS=[{k:'goles',l:'⚽ Goleadores',c:''},{k:'asistencias',l:'🎯 Asistencias',c:'b'},{k:'amarillas',l:'🟨 Amarillas',c:'y'},{k:'rojas',l:'🟥 Rojas',c:'r'},{k:'porteros',l:'🧤 Porteros',c:'b'}];
let CL='wc',CS='res',CT='goles';

function goSec(s,btn){
  CS=s;
  document.querySelectorAll('.sec').forEach(x=>x.classList.remove('active'));
  document.getElementById('sec-'+s).classList.add('active');
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function goLeague(btn,k){
  CL=k;
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function goStat(k){
  CT=k;
  document.querySelectorAll('.stab').forEach(b=>b.classList.toggle('active',b.dataset.k===k));
  renderStat();
}
function render(){
  if(CS==='res') renderRes();
  else if(CS==='pos') renderPos();
  else renderSta();
}

function mcard(g){
  const lv=g.s==='live',fn=g.s==='final';
  const bdg=lv?`<span class="badge blv"><span class="blink"></span>En vivo</span>`:fn?`<span class="badge bfn">Final</span>`:`<span class="badge bsc">Próximo</span>`;
  const sc=(lv||fn)?`<div class="snums">${g.hs}<span class="ssep"> – </span>${g.as}</div>`:`<div class="vstxt">vs</div>`;
  const pb=g.ph?`<div class="pbar-w"><div class="pbar"><div class="ph_" style="flex:${g.ph}"></div><div class="pd_" style="flex:${g.pd}"></div><div class="pa_" style="flex:${g.pa}"></div></div><div class="plbls"><span style="color:var(--g)">${g.h.split(' ')[0]} ${g.ph}%</span><span style="color:var(--y)">Emp. ${g.pd}%</span><span style="color:var(--bl)">${g.a.split(' ')[0]} ${g.pa}%</span></div></div>`:'';
  return `<div class="mcard${lv?' lv':''}"><div class="mcard-hd">${bdg}<span class="mt">${g.t}</span></div><div class="mrow"><div class="tcol"><div class="tflag">${f(g.h)}</div><div class="tname">${g.h}</div></div><div class="scol">${sc}</div><div class="tcol"><div class="tflag">${f(g.a)}</div><div class="tname">${g.a}</div></div></div>${pb}</div>`;
}

function renderRes(){
  const L=LG[CL];
  document.getElementById('rt').textContent=L.n;
  document.getElementById('rs').textContent=L.s+' · Hora Colombia';
  const gs=M[CL]||[];
  const lv=gs.filter(g=>g.s==='live'),sc=gs.filter(g=>g.s==='sched'),fn=gs.filter(g=>g.s==='final');
  let h='';
  if(lv.length) h+=`<div class="shead"><span class="shead-lbl"><span class="blink" style="margin-right:4px"></span>En juego</span><div class="shead-line"></div></div><div class="grid2">${lv.map(mcard).join('')}</div>`;
  if(sc.length) h+=`<div class="shead"><span class="shead-lbl">Próximos</span><div class="shead-line"></div></div><div class="grid2">${sc.map(mcard).join('')}</div>`;
  if(fn.length) h+=`<div class="shead"><span class="shead-lbl">Resultados</span><div class="shead-line"></div></div><div class="grid2">${fn.map(mcard).join('')}</div>`;
  document.getElementById('rb').innerHTML=h||'<p style="color:var(--tx3);padding:1rem 0">Sin partidos</p>';
}

function renderPos(){
  const L=LG[CL];
  document.getElementById('pt').textContent='Tabla — '+L.n;
  document.getElementById('ps').textContent=L.s;
  const d=POS[CL];
  let h='';
  if(d.type==='g'){
    for(const[grp,rows] of Object.entries(d.groups)){
      h+=`<div class="gbox"><div class="gbhd">Grupo ${grp}</div><table class="sttable"><thead><tr><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th style="color:var(--y)">Pts</th></tr></thead><tbody>`;
      rows.forEach((r,i)=>{h+=`<tr class="${i<2?'qcl':''}"><td><div class="tcell"><span>${r.f}</span>${r.t}</div></td><td>${r.g}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td><td>${r.gf}</td><td>${r.ga}</td><td class="pts">${r.p}</td></tr>`;});
      h+=`</tbody></table></div>`;
    }
    h+=`<div class="legend"><span style="border-color:var(--g)">Clasifican a octavos</span></div>`;
  } else if(!d.rows||!d.rows.length){
    h='<p style="color:var(--tx3);padding:1.5rem 0">Temporada aún no iniciada</p>';
  } else {
    h=`<div style="background:var(--s2);border:0.5px solid var(--b1);border-radius:var(--rad);overflow:hidden"><table class="sttable"><thead><tr><th style="padding-left:.75rem">Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th style="color:var(--y);padding-right:.75rem">Pts</th></tr></thead><tbody>`;
    d.rows.forEach((r,i)=>{
      const cls=r.cl?'qcl':r.el?'qel':r.rl?'qrl':'';
      const rk=i===0?'rk1':i===1?'rk2':i===2?'rk3':'';
      const dg=r.gf-r.ga;
      h+=`<tr class="${cls}"><td style="padding-left:.75rem"><div class="tcell"><span class="rk ${rk}">${i+1}</span><span>${r.f}</span>${r.t}</div></td><td>${r.g}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td><td>${r.gf}</td><td>${r.ga}</td><td style="color:${dg>=0?'var(--g)':'var(--r)'}">${dg>0?'+':''}${dg}</td><td class="pts" style="padding-right:.75rem">${r.p}</td></tr>`;
    });
    h+=`</tbody></table></div><div class="legend"><span style="border-color:var(--g)">Champions</span><span style="border-color:var(--y)">Europa League</span><span style="border-color:var(--r)">Descenso</span></div>`;
  }
  document.getElementById('pb').innerHTML=h;
}

function renderSta(){
  const L=LG[CL];
  document.getElementById('st').textContent='Estadísticas — '+L.n;
  document.getElementById('ss').textContent=L.s;
  document.getElementById('stabs').innerHTML=SDEFS.map(d=>`<button class="stab${CT===d.k?' active':''}" data-k="${d.k}" onclick="goStat('${d.k}')">${d.l}</button>`).join('');
  renderStat();
}

function renderStat(){
  const def=SDEFS.find(d=>d.k===CT);
  const pl=(ST[CL]||{})[CT]||[];
  let h='';
  pl.forEach((p,i)=>{
    const vc=def.c?` ${def.c}`:'';
    h+=`<div class="spcard"><div class="sprank${i<3?' top':''}">${i+1}</div><div class="spav">${p.f}</div><div class="spin"><div class="spname">${p.n}</div><div class="spteam">${p.t}</div>${p.lbl?`<div style="font-size:9px;color:var(--tx3);margin-top:2px">${p.lbl}</div>`:''}</div><div style="text-align:right"><div class="spval${vc}">${p.v}</div><div class="spunit">${CT==='goles'?'goles':CT==='asistencias'?'asis.':CT==='porteros'?'':CT==='amarillas'||CT==='rojas'?'tarj.':''}</div></div></div>`;
  });
  if(!pl.length) h='<p style="color:var(--tx3);padding:1.5rem 0">Sin datos</p>';
  document.getElementById('sb').innerHTML=h;
}

// Live band
const allLive=Object.values(M).flat().filter(g=>g.s==='live');
const lb=document.getElementById('lb');
if(allLive.length){
  lb.innerHTML=`<span style="font-size:10px;color:var(--tx3);flex-shrink:0">En vivo:</span>`+allLive.map(g=>`<div class="liveitem"><span class="blink"></span><span style="color:var(--tx2)">${f(g.h)} ${g.h}</span><span style="color:#fff;font-weight:700">${g.hs}–${g.as}</span><span style="color:var(--tx2)">${g.a} ${f(g.a)}</span></div>`).join('');
}else{lb.style.display='none';}

renderRes();
</script>
